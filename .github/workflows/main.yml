name: Docker CI/CD to EC2

on:
  push:
    branches:
      - main  #Dev environment

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    # Build Docker Image
    - name: Build Docker Image
      run: docker build -t python-app .

    # Save image as tar
    - name: Save Docker Image
      run: docker save python-app > python-app.tar

    # Copy image to EC2
    - name: Copy image to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        source: "python-app.tar"
        target: "/home/ec2-user/"

    # Run container on EC2
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          # Install Docker if not installed
          sudo yum install docker -y
          sudo systemctl start docker

          # Load image
          docker load < python-app.tar

          # Stop old container
          docker stop python-container || true
          docker rm python-container || true

          # Run new container
          docker run -d -p 5000:5000 --name python-container python-app